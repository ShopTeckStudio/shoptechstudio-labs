# HTTP server
server {
    listen 80;
    server_name 192.168.4.182;  # <-- replace with your local IP, domain, or _
 
    # Static files
    root /usr/share/nginx/html;
    index index.html;
 
    location / {
        try_files $uri $uri/ =404;
    }
 
    # Reverse proxy example
    # Proxies /api/* requests to an upstream container on the proxy network
    # The container must be joined to the 'proxy' network and reachable by name
    location /api/ {
        proxy_pass         http://app:3000;   # <-- replace 'app' and port as needed
        proxy_http_version 1.1;
 
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
 
        # Uncomment if proxying to a service that uses WebSockets
        # proxy_set_header Upgrade   $http_upgrade;
        # proxy_set_header Connection "upgrade";
 
        proxy_read_timeout 90;
    }
 
    # Uncomment to redirect all HTTP traffic to HTTPS once SSL is configured
    # return 301 https://$host$request_uri;
}
 
 
