# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name example.com www.example.com;  # <-- replace with your domain

    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name example.com www.example.com;  # <-- replace with your domain

    # SSL certificates
    ssl_certificate     /etc/nginx/certs/fullchain.pem;   # <-- replace with your cert path
    ssl_certificate_key /etc/nginx/certs/privkey.pem;     # <-- replace with your key path

    # Recommended SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Static files — served directly by Nginx
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Reverse proxy example — proxies /api/* to an upstream container
    # The container must be on the 'proxy' network and named 'app'
    location /api/ {
        proxy_pass         http://app:3000;   # <-- replace 'app' and port as needed
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";  # needed for WebSockets

        proxy_read_timeout 90;
    }
}
