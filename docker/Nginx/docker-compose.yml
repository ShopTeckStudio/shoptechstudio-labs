services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
 
    ports:
      - "80:80"
      - "443:443"
 
    volumes:
      # Main Nginx config
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
 
      # Site-specific configs — drop .conf files in ./nginx/conf.d/
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
 
      # Static web files
      - ./nginx/html:/usr/share/nginx/html:ro
 
      # SSL certificates (e.g. from Certbot/Let's Encrypt)
      - ./nginx/certs:/etc/nginx/certs:ro
 
      # Persistent logs
      - ./nginx/logs:/var/log/nginx
 
    networks:
      - proxy
 
networks:
  proxy:
    name: proxy
    driver: bridge
    # Other containers can join this network by adding:
    #   networks:
    #     - proxy
    # and will be reachable from Nginx by their container name
 
