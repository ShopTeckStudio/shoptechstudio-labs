services:
  unbound:
    container_name: unbound
    image: mvance/unbound:latest
    expose:
      - "53"
    networks:
      - dns-net
    restart: unless-stopped
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    networks:
      - dns-net
      - proxy
    depends_on:
      - unbound
    ports:
      # DNS Ports
      - "53:53/tcp"
      - "53:53/udp"
      # Default HTTP Port
      - "8082:80/tcp"
    environment:
      TZ: "America/Los_Angeles"
      FTLCONF_dns_listeningMode: 'ALL'
            DNS1: "unbound#53"
    volumes: 
      - './etc-pihole:/etc/pihole'
    restart: unless-stopped
    
networks:
  dns-net:
    driver: bridge 
  proxy:
    external: true   
    
      
      
